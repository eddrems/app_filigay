<!DOCTYPE html>
<html lang="es" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Actualizar acceso — Escuela ZAO</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script src="js/tailwind.config.js"></script>
    <link rel="stylesheet" href="css/zao.css" />
  </head>
  <body class="login-mesh flex min-h-full items-center justify-center p-4" x-data="profileUpdatePage">
    <main class="w-full max-w-lg rounded-2xl border border-outline-variant/40 bg-surface-container-lowest p-8 shadow-card-hover">
      <div class="mb-8 text-center">
        <div class="mx-auto mb-4 flex h-14 w-14 items-center justify-center rounded-2xl bg-primary">
          <span class="material-symbols-outlined filled text-2xl text-on-primary">lock_reset</span>
        </div>
        <h1 class="text-headline-md font-bold text-primary">Define tu nueva contraseña</h1>
        <p class="mt-2 text-body-md text-on-surface-variant">
          Por seguridad debes cambiar la clave inicial. Tu primera contraseña era tu número de teléfono.
        </p>
      </div>

      <form @submit.prevent="submit" class="space-y-5">
        <template x-if="error">
          <p x-text="error" class="rounded-lg border border-error/30 bg-error-container px-4 py-3 text-sm font-medium text-on-error-container" role="alert"></p>
        </template>
        <template x-if="success">
          <p x-text="success" class="rounded-lg border border-tertiary-container/30 bg-tertiary-fixed/40 px-4 py-3 text-sm font-medium text-tertiary-container" role="status"></p>
        </template>

        <div class="rounded-lg border border-primary/20 bg-surface-container-low px-4 py-3 text-sm text-on-surface-variant">
          Confirma tus datos y elige una contraseña personal (mínimo 6 caracteres).
        </div>

        <div>
          <label class="mb-1.5 block text-label-md text-on-surface" for="email">Correo electrónico</label>
          <input id="email" type="email" x-model="email" required autocomplete="email" class="w-full rounded-lg border border-outline-variant bg-surface px-4 py-3 text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20" />
        </div>
        <div>
          <label class="mb-1.5 block text-label-md text-on-surface" for="phone">Teléfono</label>
          <input id="phone" type="tel" x-model="phone" required autocomplete="tel" class="w-full rounded-lg border border-outline-variant bg-surface px-4 py-3 text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20" />
        </div>

        <hr class="border-outline-variant/40" />

        <div>
          <label class="mb-1.5 block text-label-md text-on-surface" for="new-password">Nueva contraseña</label>
          <input id="new-password" type="password" x-model="newPassword" required minlength="6" autocomplete="new-password" class="w-full rounded-lg border border-outline-variant bg-surface px-4 py-3 text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20" />
        </div>
        <div>
          <label class="mb-1.5 block text-label-md text-on-surface" for="confirm-password">Confirmar contraseña</label>
          <input id="confirm-password" type="password" x-model="confirmPassword" required minlength="6" autocomplete="new-password" class="w-full rounded-lg border border-outline-variant bg-surface px-4 py-3 text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20" />
        </div>

        <button
          type="submit"
          :disabled="loading || !ready"
          class="flex w-full items-center justify-center gap-2 rounded-lg bg-primary py-4 text-sm font-semibold text-on-primary shadow-sm transition hover:bg-primary-container disabled:opacity-60"
        >
          <span x-text="loading ? 'Guardando…' : 'Guardar y entrar al portal'">Guardar y entrar al portal</span>
          <span class="material-symbols-outlined text-lg" x-show="!loading">arrow_forward</span>
        </button>
      </form>
    </main>

    <script type="module" src="js/init-actualizar-perfil.js"></script>
  </body>
</html>
